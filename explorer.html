<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGI | REGISTRE OFFICIEL NEXUS</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020617; --surface: #0f172a; --border: rgba(255, 255, 255, 0.08); 
            --accent: #38bdf8; --text-main: #f8fafc; --text-dim: #64748b; 
            --danger: #ef4444; --success: #10b981; --agi-gold: #fbbf24; 
            --overlay: rgba(0, 0, 0, 0.98);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        /* ÉCRAN DE VERROUILLAGE */
        #pinOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 14px; height: 14px; border: 2px solid var(--border); border-radius: 4px; transition: 0.2s; }
        .dot.active { background: var(--agi-gold); border-color: var(--agi-gold); box-shadow: 0 0 15px var(--agi-gold); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 300px; }
        .key { aspect-ratio: 1; border-radius: 18px; background: var(--surface); border: 1px solid var(--border); color: #fff; font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .key:active { background: var(--agi-gold); color: #000; transform: scale(0.92); }

        /* APP CONTAINER */
        .app-container { 
            width: 100%; max-width: 480px; height: 100vh; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; position: relative; filter: blur(25px); transition: filter 0.8s ease; opacity: 0.5;
        }
        .app-container.unlocked { filter: blur(0); opacity: 1; }

        .fixed-header { flex-shrink: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding-bottom: 10px; background-image: radial-gradient(circle at 50% 0%, rgba(251, 191, 36, 0.08) 0%, transparent 70%); }
        header { padding: 20px 20px 10px; text-align: center; }
        .legal-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(251, 191, 36, 0.1); padding: 5px 14px; border-radius: 100px; margin-bottom: 8px; border: 1px solid rgba(251, 191, 36, 0.2); }
        
        .registry-card { margin: 0 15px 10px; padding: 15px; background: linear-gradient(145deg, #0f172a 0%, #020617 100%); border-radius: 20px; border: 1px solid var(--border); }
        .reg-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.65rem; }
        
        .search-bar { margin: 0 15px 10px; position: relative; }
        .search-bar input { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 12px 15px 12px 40px; border-radius: 12px; color: #fff; font-size: 0.8rem; outline: none; }
        .search-bar i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }

        .masse-box { padding: 15px 20px; margin: 0 15px 10px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .masse-val { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 700; color: var(--agi-gold); display: block; }

        .scrollable-content { flex-grow: 1; overflow-y: auto; padding-bottom: 120px; }
        .tx-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin: 0 15px 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        
        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: var(--overlay); backdrop-filter: blur(15px); display: none; z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { width: 100%; max-width: 420px; background: var(--surface); border-radius: 28px; border: 1px solid var(--border); padding: 25px; }
        .detail-row { display: flex; flex-direction: column; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 4px; }
        .detail-label { color: var(--text-dim); font-size: 0.6rem; text-transform: uppercase; font-weight: 700; }
        .detail-value { color: #fff; font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; word-break: break-all; }

        .btn-back { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; background: #fff; color: #000; padding: 16px; border-radius: 18px; font-weight: 800; text-align: center; text-decoration: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4); z-index: 100; }
    </style>
</head>
<body>

    <div id="pinOverlay">
        <div style="text-align:center; margin-bottom:30px">
            <img src="https://i.imgur.com/DxND3Yn.jpeg" style="width:70px; border-radius:18px; border:2px solid var(--agi-gold); margin-bottom:15px">
            <h2 style="font-size:1rem; letter-spacing:1px">NEXUS EXPLORER</h2>
            <p style="color:var(--text-dim); font-size:0.7rem">Saisissez votre code PIN d'accès</p>
        </div>
        <div class="pin-dots" id="pinDots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad" id="keypad"></div>
    </div>

    <div class="app-container" id="mainApp">
        <div class="fixed-header">
            <header>
                <div class="legal-badge">
                    <i class="ri-shield-check-fill" style="color: var(--agi-gold)"></i>
                    <span style="font-size: 0.6rem; font-weight: 800; color: var(--agi-gold)">REGISTRE OFFICIEL - BURKINA FASO</span>
                </div>
                <h1>Ledger Explorer</h1>
            </header>

            <div class="registry-card">
                <div class="reg-item"><span class="reg-label">Structure</span><span class="reg-val">ATLAS GROUPE INTERNATIONAL</span></div>
                <div class="reg-item"><span class="reg-label">Récépissé</span><span class="reg-val" style="color:var(--agi-gold)">PHUE-3539/2025</span></div>
                <div class="reg-item" style="margin-bottom:0"><span class="reg-label">Protocole</span><span class="reg-val">Nexus Core v3.0</span></div>
            </div>

            <div class="masse-box">
                <span style="font-size:0.6rem; color:var(--text-dim); text-transform:uppercase; font-weight:800">Actif Circulant (AG-COIN)</span>
                <span class="masse-val" id="masse-totale">0 ₳</span>
            </div>

            <div class="search-bar">
                <i class="ri-search-line"></i>
                <input type="text" id="txSearch" placeholder="Rechercher un Hash ou un ID..." oninput="filterTransactions()">
            </div>
        </div>

        <div class="scrollable-content">
            <div style="padding:10px 20px; font-size:0.7rem; font-weight:800; color:var(--text-dim); text-transform:uppercase">Flux Blockchain</div>
            <div id="ledger-list"></div>
        </div>

        <a href="index.html" class="btn-back">RETOUR AU PORTAIL</a>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <div id="modalIcon" style="font-size:2.5rem; text-align:center; margin-bottom:10px"></div>
            <h3 id="modalTitle" style="text-align:center; margin-bottom:20px; text-transform:uppercase; font-size:0.9rem">Détails</h3>
            <div id="modalBody"></div>
            <button style="width:100%; margin-top:20px; padding:16px; border-radius:14px; background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--border); font-weight:800; cursor:pointer" onclick="closeModal()">FERMER LE REGISTRE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://atlasgroupebusiness-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allTransactions = [];
        let inputPin = "";
        const email = localStorage.getItem('agi_logged_email');
        const sanitizeEmail = (e) => e ? e.toLowerCase().replace(/[.#$[\]]/g, "_").trim() : null;

        // 1. PIN SYSTEM
        const initKeypad = () => {
            const keypad = document.getElementById('keypad');
            [1, 2, 3, 4, 5, 6, 7, 8, 9, 'back', 0, 'exit'].forEach(k => {
                const btn = document.createElement('div');
                btn.className = 'key';
                btn.innerHTML = k === 'back' ? '<i class="ri-backspace-line"></i>' : (k === 'exit' ? '<i class="ri-close-line"></i>' : k);
                btn.onclick = () => {
                    if(k === 'exit') window.location.href = 'index.html';
                    else if(k === 'back') inputPin = inputPin.slice(0, -1);
                    else if(inputPin.length < 6) inputPin += k;
                    updateDots();
                    if(inputPin.length === 6) verifyPin();
                };
                keypad.appendChild(btn);
            });
        };

        const updateDots = () => {
            document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i < inputPin.length));
        };

        const verifyPin = async () => {
            if(!email) return alert("Session non identifiée.");
            const snap = await get(ref(db, `accounts/${sanitizeEmail(email)}/pin`));
            if(snap.exists() && snap.val() === inputPin) {
                document.getElementById('pinOverlay').style.transform = 'translateY(-100%)';
                document.getElementById('mainApp').classList.add('unlocked');
                loadData();
            } else {
                alert("PIN INCORRECT"); inputPin = ""; updateDots();
            }
        };

        // 2. DATA LOADING
        function loadData() {
            onValue(ref(db, 'users'), (snap) => {
                let total = 0;
                if(snap.val()) Object.values(snap.val()).forEach(u => total += Math.floor(parseFloat(u.balance || 0)));
                document.getElementById('masse-totale').innerText = total.toLocaleString('fr-FR') + " ₳";
            });

            onValue(ref(db, 'requests'), (snap) => {
                const data = snap.val();
                if(!data) return;
                allTransactions = Object.entries(data)
                    .filter(([_, tx]) => tx.status === 'validé')
                    .sort((a,b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));
                renderTransactions(allTransactions);
            });
        }

        function renderTransactions(list) {
            const container = document.getElementById('ledger-list');
            container.innerHTML = list.map(([id, tx]) => {
                const isDeposit = tx.type.includes('Dépôt');
                return `
                <div class="tx-card" onclick='openTxModal("${id}", ${JSON.stringify(tx).replace(/"/g, '&quot;')})'>
                    <div style="color:${isDeposit ? 'var(--success)' : 'var(--danger)'}; font-size:1.2rem">
                        <i class="${isDeposit ? 'ri-arrow-left-down-fill' : 'ri-arrow-right-up-fill'}"></i>
                    </div>
                    <div class="tx-info">
                        <div style="font-size:0.7rem; font-weight:800; font-family:monospace">#${id.substring(0,10).toUpperCase()}</div>
                        <div style="font-size:0.6rem; color:var(--text-dim)">${tx.type} • ${new Date(tx.timestamp).toLocaleDateString()}</div>
                    </div>
                    <div style="margin-left:auto; text-align:right">
                        <div style="font-family:'JetBrains Mono'; font-weight:700; color:${isDeposit ? 'var(--success)' : 'var(--danger)'}">
                            ${Math.floor(tx.amount).toLocaleString()} ₳
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.filterTransactions = () => {
            const q = document.getElementById('txSearch').value.toUpperCase();
            const filtered = allTransactions.filter(([id, tx]) => 
                id.toUpperCase().includes(q) || (tx.user_id && tx.user_id.toUpperCase().includes(q))
            );
            renderTransactions(filtered);
        };

        // 3. MODAL LOGIC
        window.openTxModal = (id, tx) => {
            const modal = document.getElementById('detailModal');
            document.getElementById('modalTitle').innerText = tx.type;
            document.getElementById('modalIcon').innerHTML = tx.type.includes('Dépôt') ? 
                '<i class="ri-shield-flash-fill" style="color:var(--success)"></i>' : 
                '<i class="ri-shield-user-fill" style="color:var(--danger)"></i>';
            
            // Logique Source / Destination
            let src = tx.sender_id || (tx.type.includes('Dépôt') ? (tx.method || "Opérateur Externe") : tx.user_id);
            let dest = tx.receiver_id || (tx.type.includes('Dépôt') ? tx.user_id : "Trésorerie AGI");

            const fields = [
                { label: "ID Transaction Nexus", val: id.toUpperCase() },
                { label: "Provenance (Source)", val: src.toString().toUpperCase() },
                { label: "Bénéficiaire (Destination)", val: dest.toString().toUpperCase() },
                { label: "Montant Brut", val: `${Math.floor(tx.amount).toLocaleString()} ₳` },
                { label: "Date & Heure", val: new Date(tx.timestamp).toLocaleString('fr-FR') },
                { label: "Statut Audit", val: "CERTIFIÉ PAR NEXUS CORE" }
            ];

            document.getElementById('modalBody').innerHTML = fields.map(f => `
                <div class="detail-row">
                    <span class="detail-label">${f.label}</span>
                    <span class="detail-value" style="${f.label === 'Statut Audit' ? 'color:var(--success)' : (f.label.includes('Montant') ? 'color:var(--agi-gold); font-size:1rem' : '')}">
                        ${f.val}
                    </span>
                </div>`).join('');
            
            modal.style.display = 'flex'; setTimeout(() => modal.classList.add('active'), 10);
        };

        window.closeModal = () => {
            const modal = document.getElementById('detailModal');
            modal.classList.remove('active'); setTimeout(() => modal.style.display = 'none', 300);
        };

        initKeypad();
    </script>
</body>
</html>
