<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Traducteur - Arabe & Mooré</title>
    <style>
        :root { 
            --p: #009739; --s: #ef2b2d; --y: #ffcd00; --bg: #f8f9fa; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; 
        }

        .card { 
            background: white; width: 95%; max-width: 650px; padding: 40px; 
            border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            border-top: 12px solid var(--p); position: relative;
        }

        .card::after {
            content: ""; position: absolute; top: -12px; left: 50%;
            transform: translateX(-50%); width: 30px; height: 30px;
            background: var(--y); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        h1 { text-align: center; color: #2c3e50; margin: 0 0 10px 0; font-size: 2rem; }
        
        .status { 
            font-size: 0.85rem; text-align: center; margin-bottom: 20px; 
            font-weight: bold; color: #666;
        }

        select, textarea { 
            width: 100%; padding: 18px; margin-top: 10px; 
            border-radius: 12px; border: 2px solid #eee; 
            font-size: 18px; box-sizing: border-box; transition: 0.3s;
        }

        textarea { height: 120px; resize: none; }
        textarea:focus { border-color: var(--p); outline: none; }

        button { 
            width: 100%; background: linear-gradient(135deg, var(--p), #007a2e); 
            color: white; border: none; padding: 20px; margin-top: 15px;
            border-radius: 12px; font-weight: bold; font-size: 1.1rem; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,151,57,0.3);
        }

        .res { 
            margin-top: 25px; padding: 25px; background: #f1f8f4; 
            border-radius: 15px; border-left: 8px solid var(--s); 
            min-height: 80px; font-size: 1.6rem; text-align: center; 
            color: #1a1a1a; display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Atlas Traducteur</h1>
    <div class="status" id="loadStatus">Connexion au fichier JSON...</div>
    
    <select id="mode" onchange="clearResult()">
        <option value="ar_to_mo">Arabe ➔ Mooré</option>
        <option value="mo_to_ar">Mooré ➔ Arabe</option>
    </select>

    <textarea id="source" placeholder="Saisissez votre texte..." oninput="autoTranslate()"></textarea>

    <button onclick="performManualTranslate()">LANCER LA TRADUCTION</button>

    <div class="res" id="result">---</div>
</div>

<script>
    let dictionary = null;

    // Chargement strict du fichier local dictionnaire.json
    async function loadDictionary() {
        const statusEl = document.getElementById('loadStatus');
        try {
            const response = await fetch('dictionnaire.json');
            if (!response.ok) throw new Error("Fichier dictionnaire.json introuvable");
            
            dictionary = await response.json();
            
            statusEl.innerText = "● Base de données chargée avec succès";
            statusEl.style.color = "var(--p)";
        } catch (error) {
            statusEl.innerText = "● Erreur : Assurez-vous que dictionnaire.json est dans le même dossier";
            statusEl.style.color = "var(--s)";
        }
    }

    // Recherche instantanée
    function autoTranslate() {
        if (!dictionary) return;
        const input = document.getElementById('source').value.trim().toLowerCase();
        const mode = document.getElementById('mode').value;
        const target = document.getElementById('result');

        if (input === "") {
            target.innerText = "---";
            return;
        }

        const found = dictionary[mode][input];
        if (found) {
            target.innerHTML = `<strong style="color:var(--p)">${found}</strong>`;
        }
    }

    // Recherche approfondie (Exacte puis par inclusion)
    function performManualTranslate() {
        if (!dictionary) return;
        const input = document.getElementById('source').value.trim().toLowerCase();
        const mode = document.getElementById('mode').value;
        const target = document.getElementById('result');

        if (input === "") return;

        // 1. Test direct
        let output = dictionary[mode][input];

        // 2. Test par correspondance partielle si non trouvé
        if (!output) {
            const keys = Object.keys(dictionary[mode]);
            const match = keys.find(k => k.toLowerCase().includes(input) || input.includes(k.toLowerCase()));
            if (match) output = dictionary[mode][match];
        }

        if (output) {
            target.innerHTML = `<strong style="color:var(--p)">${output}</strong>`;
        } else {
            target.innerHTML = `<span style="color:#888; font-size:1.1rem;">Aucun résultat pour "${input}"</span>`;
        }
    }

    function clearResult() {
        document.getElementById('source').value = "";
        document.getElementById('result').innerText = "---";
    }

    window.onload = loadDictionary;
</script>

</body>
</html>
